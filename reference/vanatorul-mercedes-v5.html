<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root{
  --ink:#22262B; --inksoft:#4A5058; --paper:#EDEFF1; --panel:#FAFBFC;
  --line:#C9CED4; --linesoft:#DDE1E5; --red:#B3121B; --green:#2E6B4F;
  --amber:#9A6A00; --plate:#D6DADF; --plateedge:#9FA6AE;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Archivo',system-ui,sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
.mono{font-family:'IBM Plex Mono',ui-monospace,monospace}
.wrap{max-width:1000px;margin:0 auto;padding:0 20px}
header{background:var(--ink);padding:calc(env(safe-area-inset-top,0px) + 14px) 0 14px;position:sticky;top:0;z-index:40;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.hdr-top{display:flex;justify-content:space-between;align-items:center;gap:12px}
h1{font-size:22px;font-weight:800;color:var(--panel);letter-spacing:.5px;line-height:1.1}
h1 .red{color:var(--red)}
.eyebrow{font-size:9px;letter-spacing:2px;color:var(--plateedge)}
.burger{width:46px;height:46px;border:1px solid #3A4048;background:transparent;border-radius:3px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;flex:none}
.burger span{display:block;width:20px;height:2px;background:var(--panel);transition:.2s}
.burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.burger.open span:nth-child(2){opacity:0}
.burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-badges{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.status{font-size:10px;padding:5px 9px;border-radius:2px;border:1px solid}
.status.done{border-color:var(--green);color:#7FC8A4}
.status.todo{border-color:var(--red);color:#E8888D}
.bargain-count{font-size:10px;padding:4px 9px;border-radius:2px;background:var(--red);color:#fff}
@media(max-width:560px){.hdr-badges{display:none}}
/* ===== DRAWER (hamburger) ===== */
.drawer-veil{position:fixed;inset:0;background:rgba(34,38,43,.55);z-index:60}
.drawer{position:fixed;top:0;left:0;bottom:0;width:300px;max-width:84vw;background:var(--ink);z-index:61;padding:calc(env(safe-area-inset-top,0px) + 20px) 0 20px;display:flex;flex-direction:column;box-shadow:8px 0 32px rgba(0,0,0,.35);animation:slidein .22s ease}
@keyframes slidein{from{transform:translateX(-100%)}to{transform:none}}

.drawer .brand{padding:0 22px 16px;border-bottom:1px solid #3A4048}
.drawer .brand h2{font-size:20px;font-weight:800;color:var(--panel)}
.drawer .brand h2 .red{color:var(--red)}
.drawer .brand .mono{font-size:10px;color:var(--plateedge);letter-spacing:1.5px}
.drawer nav{display:flex;flex-direction:column;padding:10px 12px;gap:2px}
.drawer nav button{display:flex;justify-content:space-between;align-items:center;width:100%;text-align:left;font-family:'Archivo';font-size:15px;font-weight:600;color:#C6CBD1;background:transparent;border:none;padding:14px 12px;border-radius:3px;cursor:pointer;min-height:48px}
.drawer nav button.on{background:#31363D;color:var(--panel)}
.drawer nav button .cnt{font-family:'IBM Plex Mono';font-size:11px;color:var(--plateedge)}
.drawer .dstats{margin-top:auto;padding:14px 22px;border-top:1px solid #3A4048}
.drawer .dstats .row2{display:flex;justify-content:space-between;font-family:'IBM Plex Mono';font-size:11px;color:var(--plateedge);padding:4px 0}

.drawer .dactions{padding:10px 12px 0;display:flex;flex-direction:column;gap:6px}
.drawer .dactions button{font-family:'IBM Plex Mono';font-size:11px;font-weight:600;padding:11px;border-radius:2px;border:1px solid #3A4048;background:transparent;color:#C6CBD1;cursor:pointer}
main{padding:18px 0 10px}
.fade{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.fade{animation:none}}
.card{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--ink);border-radius:3px;padding:18px;margin-bottom:16px}
.card.flat{border-left:1px solid var(--line)}
.plate{display:inline-flex;align-items:center;font-family:'IBM Plex Mono';font-weight:600;letter-spacing:2px;font-size:13px;padding:4px 12px;background:linear-gradient(180deg,var(--plate),#C2C7CD);border:1px solid var(--plateedge);border-radius:3px;box-shadow:inset 0 1px 0 rgba(255,255,255,.7),0 1px 2px rgba(0,0,0,.15);text-shadow:0 1px 0 rgba(255,255,255,.5)}

.row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.mname{font-size:17px;font-weight:700}

.price{font-size:14px;font-weight:600;color:var(--red)}
.band{font-size:11px;color:var(--inksoft)}
.thesis{font-size:14px;line-height:1.55;color:var(--inksoft);margin-top:12px}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.tag{font-family:'IBM Plex Mono';font-size:11px;padding:2px 8px;border:1px solid var(--linesoft);border-radius:2px;color:var(--inksoft);background:var(--paper)}

.btn.primary{background:var(--red);color:#fff;border-color:var(--red)}

.fisa{border-top:1px dashed var(--line);margin-top:14px;padding-top:12px}

.fisa .num{font-family:'IBM Plex Mono';color:var(--red)}
.verdict{font-family:'IBM Plex Mono';font-size:11px;margin-top:10px;padding:8px 12px;background:var(--paper);border:1px solid var(--linesoft);border-radius:2px}

.blueprint{background:var(--paper);border:1px solid var(--linesoft);border-radius:2px;margin-top:14px;padding:10px 14px 6px;position:relative;overflow:hidden}
.blueprint svg{width:100%;height:auto;display:block;max-height:150px}
.blueprint .bp-label{font-family:'IBM Plex Mono';font-size:10px;letter-spacing:1.5px;color:var(--plateedge);text-transform:uppercase}
.blueprint .gal{position:absolute;right:10px;bottom:8px;font-family:'IBM Plex Mono';font-size:11px;font-weight:600;color:var(--red);text-decoration:none;background:var(--panel);border:1px solid var(--line);border-radius:2px;padding:6px 10px}
.modelbtns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.modelbtns button{font-family:'IBM Plex Mono';font-size:11px;font-weight:600;letter-spacing:1px;padding:10px 14px;border-radius:2px;border:1px solid var(--line);background:var(--panel);color:var(--inksoft);cursor:pointer;min-height:40px}
.modelbtns button.on{background:var(--ink);color:var(--panel);border-color:var(--ink)}
.grid3{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin-bottom:8px}
.plat{display:block;background:var(--panel);border:1px solid var(--line);border-radius:3px;padding:14px;text-decoration:none;color:var(--ink)}
.plat .nm{font-weight:700;font-size:14px}
.plat .co{font-family:'IBM Plex Mono';font-size:10px;padding:2px 6px;background:var(--paper);border:1px solid var(--linesoft);border-radius:2px;color:var(--inksoft);float:right}
.plat .nt{font-size:12px;color:var(--inksoft);margin-top:4px}
.plat .foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.plat .go{font-family:'IBM Plex Mono';font-size:11px;font-weight:600;color:var(--red)}
.neg{font-family:'IBM Plex Mono';font-size:10px;font-weight:500;padding:2px 6px;border-radius:2px}
.neg.da{background:#E4F0EA;color:var(--green)}
.neg.part{background:#F5EDDA;color:var(--amber)}
.neg.nu{background:#F7E3E4;color:var(--red)}
.neg.ref{background:var(--paper);color:var(--inksoft)}
.gnote{font-size:12px;color:var(--inksoft);background:var(--panel);border:1px dashed var(--line);border-radius:2px;padding:8px 12px;margin-bottom:12px;max-width:800px}
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){.formgrid{grid-template-columns:1fr}}
input,select{font-family:'Archivo';font-size:16px;padding:11px 12px;border:1px solid var(--line);border-radius:2px;background:var(--paper);color:var(--ink);width:100%}
select{font-family:'IBM Plex Mono';font-size:14px}
.pv{font-family:'IBM Plex Mono';font-size:11px;font-weight:600;margin-top:4px}
.chip{font-family:'IBM Plex Mono';font-size:11px;font-weight:600;padding:2px 8px;border-radius:2px;border:1px solid var(--linesoft)}
.chip.chilipir{background:var(--red);color:#fff;border-color:var(--red)}
.chip.drop{background:#E4F0EA;color:var(--green);border-color:#BFDCCB}
.chip.stale{background:#F5EDDA;color:var(--amber);border-color:#E4D4A8}
.score{font-family:'IBM Plex Mono';font-size:19px;font-weight:600}
.score small{font-size:11px;color:var(--inksoft)}
.crit{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;border-top:1px dashed var(--linesoft);margin-top:12px;padding-top:10px}
@media(max-width:640px){.crit{grid-template-columns:1fr}}
.crit label{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--inksoft);cursor:pointer;min-height:28px}
.crit input{width:auto;transform:scale(1.15)}
.crit .w{font-family:'IBM Plex Mono';color:var(--line)}
.lrow{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.lrow select{width:auto;font-size:12px;padding:8px}
.candidate{font-family:'IBM Plex Mono';font-size:11px;padding:4px 8px;background:#E4F0EA;color:var(--green);border-radius:2px}
.del{margin-left:auto;color:var(--red)!important}
.ghid li{font-size:14px;line-height:1.6;color:var(--inksoft);margin-bottom:10px;list-style:none}
.ghid b{color:var(--ink)}
.note{font-family:'IBM Plex Mono';font-size:11px;color:var(--inksoft);border:1px dashed var(--line);border-radius:3px;padding:12px;line-height:1.6}
.empty{font-family:'IBM Plex Mono';font-size:13px;color:var(--inksoft);border:1px dashed var(--line);border-radius:3px;padding:28px;text-align:center;line-height:1.7}
footer{padding:14px 0 calc(env(safe-area-inset-bottom,0px) + 24px)}
footer .in{font-family:'IBM Plex Mono';font-size:11px;color:var(--plateedge);border-top:1px solid var(--line);padding-top:12px}
.overlay{position:fixed;inset:0;background:rgba(34,38,43,.72);display:flex;align-items:center;justify-content:center;padding:16px;z-index:70}
.popup{background:var(--panel);border:2px solid var(--red);border-radius:4px;box-shadow:0 16px 48px rgba(0,0,0,.4);max-width:440px;width:100%;padding:22px;max-height:88vh;overflow:auto}
.popup.wide{max-width:760px;border-color:var(--ink)}
.popup .badge{display:inline-block;font-family:'IBM Plex Mono';font-size:11px;letter-spacing:2px;background:var(--red);color:#fff;padding:5px 10px;border-radius:2px;animation:pulse 1.2s ease infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(179,18,27,.35)}50%{box-shadow:0 0 0 8px rgba(179,18,27,0)}}
@media (prefers-reduced-motion:reduce){.popup .badge{animation:none}}
.popup h3{font-size:18px;font-weight:800;margin-top:10px}
.popup .pm{font-family:'IBM Plex Mono';font-size:13px;color:var(--red);margin-top:4px}
.popup p{font-size:14px;line-height:1.55;color:var(--inksoft);margin-top:12px}
.popup p b{color:var(--ink)}
.popup .close{width:100%;margin-top:16px}
.savefail{font-family:'IBM Plex Mono';font-size:11px;background:#F7E3E4;border:1px solid var(--red);color:var(--red);border-radius:2px;padding:8px 12px;margin-bottom:14px}
.onb{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--red);border-radius:3px;padding:14px 16px;margin-bottom:16px;font-size:14px;color:var(--inksoft);line-height:1.6}
.onb b{color:var(--ink)}
/* toolbar listă */
.toolbar{display:grid;grid-template-columns:1fr auto auto auto;gap:8px;margin-bottom:14px}
@media(max-width:720px){.toolbar{grid-template-columns:1fr 1fr}}
.toolbar input,.toolbar select{font-size:13px;padding:9px 10px}
/* comparator */
.cmpbar{position:fixed;left:0;right:0;bottom:0;background:var(--ink);z-index:45;padding:10px 0 calc(env(safe-area-inset-bottom,0px) + 10px)}
.cmpbar .wrap{display:flex;justify-content:space-between;align-items:center;gap:10px}
.cmpbar .t{font-family:'IBM Plex Mono';font-size:12px;color:var(--panel)}
.cmp-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}
.cmp-table th,.cmp-table td{border:1px solid var(--linesoft);padding:8px;text-align:left;vertical-align:top}
.cmp-table th{font-family:'IBM Plex Mono';font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--inksoft);background:var(--paper);white-space:nowrap}
.cmp-table td b{font-size:13px}
.cmpchk{display:flex;align-items:center;gap:6px;font-family:'IBM Plex Mono';font-size:11px;color:var(--inksoft);cursor:pointer}
.cmpchk input{width:auto;transform:scale(1.2)}
.hist{font-family:'IBM Plex Mono';font-size:10px;color:var(--inksoft);margin-top:4px}
/* ===== TAB AGENT / TOP OFERTE ===== */
.agent-import textarea{width:100%;min-height:110px;font-family:'IBM Plex Mono';font-size:12px;padding:10px;border:1px solid var(--line);border-radius:2px;background:var(--paper);color:var(--ink);resize:vertical}
.agentmsg{font-family:'IBM Plex Mono';font-size:11px;padding:8px 12px;border-radius:2px;margin-top:8px}
.agentmsg.ok{background:#E4F0EA;color:var(--green);border:1px solid #BFDCCB}
.agentmsg.err{background:#F7E3E4;color:var(--red);border:1px solid var(--red)}
.offer{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--ink);border-radius:3px;padding:14px;margin-bottom:12px;position:relative}
.offer.exc{border-color:var(--green);border-left-color:var(--green);box-shadow:0 0 0 1px #BFDCCB}
.rank{position:absolute;top:-1px;right:-1px;font-family:'IBM Plex Mono';font-size:11px;font-weight:600;background:var(--ink);color:var(--panel);padding:4px 10px;border-radius:0 3px 0 3px}
.offer.exc .rank{background:var(--green)}
.oscore{font-family:'IBM Plex Mono';font-size:22px;font-weight:600;line-height:1}
.oscore small{font-size:10px;color:var(--inksoft)}
.obadges{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.ob{font-family:'IBM Plex Mono';font-size:10px;font-weight:600;padding:3px 7px;border-radius:2px;border:1px solid var(--linesoft);color:var(--inksoft)}
.ob.full{background:var(--ink);color:var(--panel);border-color:var(--ink)}
.ob.hist{background:#E4F0EA;color:var(--green);border-color:#BFDCCB}
.ob.exc{background:var(--green);color:#fff;border-color:var(--green)}
.obreak{font-family:'IBM Plex Mono';font-size:10px;color:var(--plateedge);margin-top:6px}
.ad{border:1px dashed var(--plateedge);border-radius:2px;background:repeating-linear-gradient(45deg,var(--panel),var(--panel) 10px,#F3F4F6 10px,#F3F4F6 20px);display:flex;align-items:center;justify-content:center;color:var(--plateedge);font-family:'IBM Plex Mono';font-size:10px;letter-spacing:2px;text-transform:uppercase;margin:0 0 18px;text-align:center;padding:8px}
.ad.banner{min-height:90px}
.ad.infeed{min-height:110px;margin:0 0 16px}
.ad.footer-ad{min-height:100px;margin:18px 0 0}
@media(max-width:520px){.card{padding:14px}}
</style>
</head>

/* Grade de stare (à la ghidurile de evaluare) — multiplicator aplicat benzii de preț */
const CONDS=[
 {id:"1",label:"#1 Concurs — impecabilă, ca nouă",mult:1.30},
 {id:"2",label:"#2 Excelentă — foarte bună, mici semne",mult:1.00},

];
const condOf=id=>CONDS.find(c=>c.id===String(id))||CONDS[1];

/* Costuri estimative de aducere în RO pe țară (transport platformă, €) */
const TRANSPORT={RO:0,DE:600,AT:500,HU:300,FR:800,IT:800,NL:700,BE:700,ES:1100,PT:1200,GR:1100,UK:1300,CH:700,PL:400,CZ:400};
const trCost=c=>TRANSPORT[String(c||"").toUpperCase()]??800;
const REG_COST=900; /* înmatriculare + traduceri + service intrare */
const offerTotal=o=>{const p=parsePrice(o.price);return p==null?null:p+trCost(o.country)+REG_COST;};
/* Scor calitate-preț 0–100: preț vs bandă(stare) 40 · dotări 15 · istoric 15 · negociere 8 · aducere 12 · km 10 */
function offerScore(o){
 const m=modelOf(o.model);const p=parsePrice(o.price);if(!m||p==null)return 0;
 const mult=condOf(o.cond||"2").mult;const lo=m.band[0]*mult,hi=m.band[1]*mult;
 let s=0;
 s+= p<=lo*0.85?40 : p<lo?32 : p<=hi?22 : 8;
 const opt=String(o.options||"").toLowerCase();
 s+= opt==="full"?15 : opt==="partial"?8 : 3;
 s+= o.history?15:0;
 s+= o.neg==="DA"?8 : o.neg==="PARTIAL"?4 : 0;
 const t=trCost(o.country);
 s+= t===0?12 : t<=600?9 : t<=900?6 : 3;
 const km=parsePrice(o.km);
 s+= km==null?4 : (km>=80000&&km<=150000)?10 : km<80000?7 : 4;
 return Math.min(100,s);
}
const EXC_THRESHOLD=85;

 const mult=condOf(cond||"2").mult;
 const lo=Math.round(m.band[0]*mult),hi=Math.round(m.band[1]*mult);
 if(p<lo*0.85)return{key:"CHILIPIR",label:"⚠ CHILIPIR POTENȚIAL",color:"var(--red)",desc:`Cu ${Math.round((1-p/lo)*100)}% sub pragul pieței pentru starea aleasă`,lo,hi};
 if(p<lo)return{key:"SUB",label:"SUB PIAȚĂ",color:"var(--green)",desc:"Preț atractiv — verifică de ce",lo,hi};
 if(p<=hi)return{key:"LA",label:"LA PIAȚĂ",color:"var(--amber)",desc:"Preț corect pentru starea aleasă",lo,hi};
 return{key:"PESTE",label:"PESTE PIAȚĂ",color:"var(--inksoft)",desc:"Justificat doar de rulaj mic / dotări rare",lo,hi};}

    <li><b>Bonus vehicul istoric (30+ ani):</b> atestare prin Retromobil Club România (FIVA) — avantaje la impozit local, asigurare de colecție, ITP extins. Verifică condițiile curente.</li>
   </ul></div>
   <div class="card flat"><div class="seclabel">▸ Strategia de deținere (5–10 ani)</div><ul class="ghid">
    <li>· <b>Bugetează 15–20% peste prețul de achiziție</b> — transport, înmatriculare, service de intrare. Calculatorul „la cheie în RO” folosește +1.500 € ca estimare standard.</li>
    <li>· <b>Kilometrajul optim la cumpărare: 80.000–150.000 km documentați.</b> Rulajul foarte mic ia prima cea mai mare, dar orice km condus i-o consumă; 150.000 km rămâne bariera psihologică la revânzare.</li>
    <li>· <b>Gradele de stare din aplicație:</b> #1 Concurs (+30% peste banda de bază), #2 Excelentă (banda de referință), #3 Bună (−30%), #4 Proiect (−55%). Evaluează sincer — majoritatea anunțurilor „impecabile” sunt de fapt #3.</li>
    <li>· <b>Depozitare corectă = jumătate din investiție.</b> Garaj uscat, aerisit, husă respirantă, baterie pe menținere.</li>
    <li>· <b>Documentează tot de la ziua 1:</b> dosar cu facturi, poze, întreținerea ta. La revânzare adaugă 10–20% la preț.</li>
    <li>· <b>Condu mașina — 1.000–3.000 km/an.</b> Piața din 2026 premiază exemplarele întreținute mecanic și folosite.</li>
    <li>· <b>Nu cumpăra niciodată nevăzut</b> fără inspecție independentă.</li>
    <li>· <b>Asigurare de colecție</b> (valoare agreată) după înmatriculare.</li>
   </ul></div>
   <div class="card flat"><div class="seclabel">▸ 📱 Instalează aplicația pe telefon</div><ul class="ghid">
    <li><b>iPhone (Safari):</b> deschide pagina → butonul „Share” (pătratul cu săgeată) → <b>„Add to Home Screen / Adaugă la ecranul principal”</b>.</li>

    <li>Datele se salvează pe fiecare dispozitiv separat — folosește <b>Exportă / Importă</b> din meniu (☰) ca să le muți între laptop și telefon.</li>

  </div>`;
